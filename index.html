<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Links</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0b0f19; /* Deep, sleek dark background */
      color: #f3f4f6; /* Soft white text */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    p {
      font-size: 1.1rem;
      color: #9ca3af; /* Muted gray for a minimal feel */
      font-weight: 300;
      letter-spacing: -0.01em;
      margin-bottom: 2rem;
    }

    .links-container {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }

    .icon-link {
      color: #9ca3af; /* Default muted icon color */
      transition: color 0.25s ease, transform 0.2s ease;
      display: inline-block;
    }

    /* Target the SVG inside the link for smooth color transitions */
    .icon-link svg {
      fill: currentColor;
      width: 28px;
      height: 28px;
    }

    /* Subtle hover effects */
    .icon-link:hover {
      color: #ffffff; /* Bright white on hover */
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="container">
    <p>MUAHAHAHAHAHAHAHAHAHA</p>
    
    <div class="links-container">
      <!-- Discord Link -->
      <a href="https://discord.gg/akmpHGQ6P3" class="icon-link" aria-label="Discord" target="_blank" rel="noopener noreferrer">

      <!-- Email Link -->
      <a href="mailto:isarethebest@outlook.com" class="icon-link" aria-label="Email">

  </div>

</body>
</html>
